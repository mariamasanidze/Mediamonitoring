<style>
  :root{
    /* dark palette */
    --bg:#0A0C12;
    --bg-2:#0E1119;
    --surface:#12151F;
    --surface-2:#171B27;
    --surface-3:#1C2130;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.13);
    --ink:#F4F6FB;
    --ink-2:#C6CDDB;
    --muted:#8891A4;
    --muted-2:#5D667A;
    --brand:#8B5CF6;
    --brand-2:#A78BFA;
    --brand-3:#C4B5FD;
    --brand-soft:rgba(139,92,246,.16);
    --brand-tint:rgba(139,92,246,.09);
    --brand-line:rgba(139,92,246,.3);
    --blue:#5B8DEF;
    --pink:#F0577E;
    --pos:#10B981;
    --neg:#F43F5E;
    --neu:#8A94A6;
    --shadow:0 30px 70px -32px rgba(0,0,0,.75);
    --shadow-sm:0 16px 40px -24px rgba(0,0,0,.7);
    --glow:0 0 0 1px rgba(139,92,246,.14), 0 20px 60px -30px rgba(139,92,246,.5);
    --radius:16px;
    --maxw:1160px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;overflow-x:hidden}
  [id]{scroll-margin-top:86px}
  h1,h2,h3,p{overflow-wrap:break-word}
  img,svg{max-width:100%}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}

  body{
    font-family:"Noto Sans Georgian","Inter",system-ui,sans-serif;
    color:var(--ink-2);
    font-size:15px;line-height:1.68;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* single cohesive purple gradient spanning the whole page */
    background:
      linear-gradient(180deg,
        #0B0912 0%,
        #0E0A1B 20%,
        #120A22 42%,
        #0E0A1B 64%,
        #0C0916 84%,
        #0B0912 100%);
  }
  html[data-lang="en"] body{font-family:"Inter","Noto Sans Georgian",system-ui,sans-serif}
  /* ambient purple glows — one accent colour, layered over the gradient */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(820px 560px at 84% -8%, rgba(139,92,246,.22), transparent 62%),
      radial-gradient(720px 620px at -8% 30%, rgba(124,58,237,.12), transparent 60%),
      radial-gradient(760px 640px at 108% 78%, rgba(139,92,246,.13), transparent 62%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:34px 34px;
    -webkit-mask-image:radial-gradient(circle at 50% 30%, #000, transparent 78%);
    mask-image:radial-gradient(circle at 50% 30%, #000, transparent 78%);
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  section{position:relative;z-index:1}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand);color:#fff}

  h1,h2,h3{color:var(--ink);font-weight:800;letter-spacing:0;line-height:1.24;text-wrap:balance}
  html[data-lang="en"] h1,html[data-lang="en"] h2{letter-spacing:-.015em;line-height:1.14}
  h2{font-size:clamp(1.4rem,2.6vw,1.95rem)}
  h3{line-height:1.3}
  .grad{background:linear-gradient(100deg,#fff 10%,var(--brand-3) 55%,var(--blue) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:600;letter-spacing:.15em;
    text-transform:uppercase;color:var(--brand-3);display:inline-flex;align-items:center;gap:.6em}
  .eyebrow::before{content:"";width:18px;height:2px;background:var(--brand);border-radius:2px}
  .mono{font-family:"IBM Plex Mono",monospace}
  .lead{color:var(--muted);font-size:clamp(.94rem,1.15vw,1.04rem);line-height:1.72}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-weight:600;font-size:.9rem;
    padding:.8em 1.35em;border-radius:11px;border:1px solid transparent;cursor:pointer;line-height:1.2;
    transition:transform .18s ease, box-shadow .25s ease, background .2s, border-color .2s, color .2s;white-space:nowrap}
  .btn:focus-visible{outline:2px solid var(--brand);outline-offset:3px}
  .btn-primary{background:linear-gradient(180deg,#9366F5,#7C3AED);color:#fff;
    box-shadow:0 10px 26px -10px rgba(139,92,246,.65), inset 0 1px 0 rgba(255,255,255,.18)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 34px -10px rgba(139,92,246,.8), inset 0 1px 0 rgba(255,255,255,.22)}
  .btn-ghost{background:rgba(255,255,255,.03);color:var(--ink);border-color:var(--line-2)}
  .btn-ghost:hover{border-color:var(--brand-line);background:rgba(139,92,246,.08);transform:translateY(-2px)}
  .btn-lg{padding:.95em 1.6em;font-size:.95rem}
  .btn svg{width:16px;height:16px}

  /* nav */
  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);
    background:rgba(10,12,18,.72);border-bottom:1px solid transparent;transition:border-color .3s, background .3s}
  header.nav.scrolled{border-bottom-color:var(--line);background:rgba(10,12,18,.9)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;color:var(--ink);flex:none;min-width:0}
  .brand .logo{width:32px;height:32px;flex:none;border-radius:9px;display:block;
    box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 6px 16px -8px rgba(139,92,246,.6)}
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{color:var(--muted);font-size:.88rem;font-weight:500;transition:color .18s;white-space:nowrap}
  .nav-links a:hover{color:var(--ink)}
  .nav-cta{display:flex;align-items:center;gap:11px}
  .lang{display:inline-flex;align-items:center;border:1px solid var(--line-2);border-radius:10px;overflow:hidden;background:rgba(255,255,255,.03);flex:none}
  .lang button{font-family:"IBM Plex Mono",monospace;font-size:.72rem;font-weight:600;letter-spacing:.04em;
    padding:.62em .8em;background:transparent;border:0;cursor:pointer;color:var(--muted);transition:background .18s,color .18s}
  .lang button.on{background:var(--brand);color:#fff}
  .hamburger{display:none;background:rgba(255,255,255,.04);border:1px solid var(--line-2);border-radius:10px;width:40px;height:40px;
    cursor:pointer;align-items:center;justify-content:center;flex:none}
  .hamburger svg{width:19px;height:19px;stroke:var(--ink)}
  .mobile-menu{display:none;border-top:1px solid var(--line);background:rgba(14,17,25,.98);backdrop-filter:blur(16px)}
  .mobile-menu a{display:block;padding:13px 24px;color:var(--muted);font-weight:500;font-size:.92rem;border-bottom:1px solid var(--line)}
  .mobile-menu a:hover{color:var(--ink);background:rgba(255,255,255,.03)}
  .mobile-menu.open{display:block}

  /* hero */
  .hero{padding:clamp(44px,6.5vw,80px) 0 clamp(48px,7vw,84px)}
  .hero-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(34px,4.5vw,58px);align-items:center}
  .hero h1{font-size:clamp(1.85rem,4vw,2.95rem);margin:18px 0 0;color:#fff}
  .hero h1 .hl{color:var(--brand-3)}
  .hero p.lead{margin:18px 0 0;max-width:36em;color:var(--ink-2);opacity:.82}
  .hero-cta{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
  .hero-trust{display:flex;gap:12px 24px;margin-top:26px;flex-wrap:wrap;align-items:center}
  .hero-trust .ht{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.84rem}
  .hero-trust .ck{width:17px;height:17px;border-radius:50%;background:var(--brand-soft);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;flex:none}
  .hero-trust .ck svg{width:10px;height:10px;stroke:var(--brand-3)}

  /* card base (glass) */
  .glass{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.04)}

  /* ---- signature: live feed ---- */
  .feed{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
    border:1px solid var(--line-2);border-radius:var(--radius);box-shadow:var(--glow);overflow:hidden;backdrop-filter:blur(4px)}
  .feed-head{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .feed-head .dot{width:8px;height:8px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 4px rgba(16,185,129,.2);animation:bp 1.8s infinite}
  @keyframes bp{0%,100%{box-shadow:0 0 0 4px rgba(16,185,129,.2)}50%{box-shadow:0 0 0 7px rgba(16,185,129,0)}}
  .feed-head .ttl{font-weight:700;font-size:.88rem;color:var(--ink)}
  .feed-head .live{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--pos);background:rgba(16,185,129,.12);padding:.32em .6em;border-radius:6px;font-weight:600}
  .spark{padding:0 16px;height:40px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .spark svg{width:100%;height:32px;overflow:visible}
  .feed-body{padding:8px 9px;display:flex;flex-direction:column;gap:8px;height:272px;overflow:hidden;position:relative}
  .mention{flex:none;display:flex;flex-direction:column;gap:6px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;
    background:rgba(255,255,255,.03);opacity:0;transform:translateY(-8px)}
  .mention.show{opacity:1;transform:none;transition:all .5s cubic-bezier(.2,.7,.3,1)}
  .mention.out{opacity:0;transform:translateY(10px) scale(.98);transition:all .45s ease}
  .mention .top{display:flex;align-items:center;gap:9px}
  .mention .src{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",monospace;font-size:.7rem;color:var(--ink);font-weight:500}
  .mention .src i{width:8px;height:8px;border-radius:2px;display:block}
  .mention .time{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:var(--muted-2)}
  .mention .mtxt{font-size:.82rem;color:var(--ink-2);line-height:1.5}
  .mention .mtxt mark,.mtxt mark{background:var(--brand-soft);color:var(--brand-3);padding:0 3px;border-radius:3px;font-weight:600}
  .stag{align-self:flex-start;font-family:"IBM Plex Mono",monospace;font-size:.6rem;font-weight:600;letter-spacing:.04em;
    padding:.28em .6em;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
  .stag::before{content:"";width:6px;height:6px;border-radius:50%}
  .stag.pos{background:rgba(16,185,129,.13);color:#34D399}.stag.pos::before{background:var(--pos)}
  .stag.neg{background:rgba(244,63,94,.13);color:#FB7185}.stag.neg::before{background:var(--neg)}
  .stag.neu{background:rgba(138,148,166,.16);color:#AAB2C2}.stag.neu::before{background:var(--neu)}
  .feed-foot{border-top:1px solid var(--line);padding:12px 16px;display:flex;flex-direction:column;gap:11px}
  .fcount{display:flex;align-items:center;gap:10px}
  .fcount .lbl{font-family:"IBM Plex Mono",monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .fcount b{font-weight:800;font-size:1.1rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .fcount .delta{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.6rem;color:var(--pos);
    background:rgba(16,185,129,.12);padding:.3em .55em;border-radius:6px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .fcount .delta::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--pos);animation:bp 1.8s infinite}
  .sdist{display:flex;align-items:center;gap:10px}
  .sdist .lbl{font-family:"IBM Plex Mono",monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);width:78px;flex:none}
  .sbar{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;display:flex}
  .sbar i{height:100%;display:block;transition:width 1.2s ease}
  .sbar .p{background:var(--pos)}.sbar .u{background:var(--neg)}.sbar .n{background:var(--neu)}
  .alert{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;border:1px solid rgba(244,63,94,.35);
    background:rgba(244,63,94,.1);opacity:0;transform:translateY(6px)}
  .alert.show{opacity:1;transform:none;transition:all .5s ease}
  .alert .ai{width:30px;height:30px;border-radius:8px;background:rgba(244,63,94,.18);display:flex;align-items:center;justify-content:center;flex:none}
  .alert .ai svg{width:16px;height:16px;stroke:#FB7185}
  .alert .at{font-size:.78rem;color:var(--ink);line-height:1.45}
  .alert .at b{color:#FB7185;font-weight:700}
  .alert .at span{display:block;font-size:.7rem;color:var(--muted)}

  /* stat band */
  .stats{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
  .stats .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;padding:clamp(38px,4vw,52px) 24px}
  .stat .n{font-weight:800;font-size:clamp(1.35rem,1.7vw,1.8rem);line-height:1;color:var(--brand-3)}
  .stat .n em{color:var(--brand-3);font-style:normal}
  .stat .l{color:var(--muted);font-size:.82rem;margin-top:10px;line-height:1.55}
  .stat:not(:last-child){border-right:1px solid var(--line);padding-right:24px}

  /* sections */
  .sec{padding:clamp(58px,8vw,100px) 0}
  .sec-head{max-width:660px;margin-bottom:clamp(34px,4.5vw,50px)}
  .sec-head.center{margin-left:auto;margin-right:auto;text-align:center}
  .sec-head.center .eyebrow{justify-content:center}
  .sec-head h2{margin-top:14px}
  .sec-head p{margin-top:13px}

  /* overview strip */
  .ov{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
  .ovc{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
    border:1px solid var(--line);border-radius:var(--radius);padding:23px 22px;display:flex;flex-direction:column;position:relative;overflow:hidden;
    transition:transform .22s, box-shadow .22s, border-color .22s}
  .ovc::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
    background:linear-gradient(160deg,rgba(139,92,246,.5),transparent 40%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    opacity:0;transition:opacity .25s}
  .ovc:hover{transform:translateY(-5px);box-shadow:var(--shadow-sm);border-color:var(--brand-line)}
  .ovc:hover::before{opacity:1}
  .ovc .oi{width:44px;height:44px;border-radius:12px;background:var(--brand-soft);border:1px solid var(--brand-line);
    display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .ovc .oi svg{width:22px;height:22px;stroke:var(--brand-3);stroke-width:1.7}
  .ovc h3{font-size:1.02rem;font-weight:700;color:var(--ink)}
  .ovc p{color:var(--muted);font-size:.85rem;margin-top:8px;flex:1;line-height:1.6}
  .ovc .go{margin-top:16px;font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:600;color:var(--brand-3);
    display:inline-flex;align-items:center;gap:6px}
  .ovc .go svg{width:13px;height:13px;stroke:var(--brand-3);stroke-width:2.2;transition:transform .2s}
  .ovc:hover .go svg{transform:translateX(3px)}

  /* function sections */
  .fnsec{padding:clamp(54px,7.5vw,96px) 0}
  .fnsec.alt{background:rgba(255,255,255,.02);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  /* heading sits full-width on top */
  .fn-head{max-width:820px;margin-bottom:clamp(30px,3.8vw,46px)}
  .fn-head h2{margin-top:15px;text-wrap:balance}
  .fn-head .lead{margin-top:13px;max-width:60ch}
  .fn-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(32px,4.5vw,58px);align-items:center}
  .fn-grid.rev{grid-template-columns:1fr 1.05fr}
  .fn-grid.rev .fn-side{order:2}
  .fn-side{min-width:0}
  .fn-badge{display:inline-flex;align-items:center;gap:.55em;font-family:"IBM Plex Mono",monospace;font-size:.66rem;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:var(--brand-3);background:var(--brand-soft);border:1px solid var(--brand-line);
    padding:.5em .8em;border-radius:9px}
  .fn-badge svg{width:14px;height:14px;stroke:var(--brand-3);stroke-width:1.9}
  .fnsec h2{margin-top:16px}
  .fnsec .lead{margin-top:13px;max-width:38em}
  .fn-list{list-style:none;display:flex;flex-direction:column;gap:14px}
  .fn-list li{display:flex;gap:11px;align-items:flex-start}
  .fn-list .ic{width:24px;height:24px;border-radius:7px;background:var(--brand-soft);border:1px solid var(--brand-line);
    display:flex;align-items:center;justify-content:center;flex:none;margin-top:2px}
  .fn-list .ic svg{width:13px;height:13px;stroke:var(--brand-3);stroke-width:2.4}
  .fn-list b{color:var(--ink);font-weight:700;font-size:.88rem}
  .fn-list em{display:block;color:var(--muted);font-size:.82rem;margin-top:2px;font-style:normal;line-height:1.58}

  .srcs{display:flex;flex-wrap:wrap;gap:7px;margin-top:20px}
  .srcs span{font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:var(--ink-2);background:rgba(255,255,255,.04);border:1px solid var(--line);
    padding:.42em .7em;border-radius:8px}
  .srcs .more{color:var(--brand-3);background:var(--brand-soft);border-color:var(--brand-line);font-weight:600}
  .ctypes{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
  .ctypes span{font-size:.74rem;color:var(--ink-2);background:rgba(255,255,255,.03);border:1px solid var(--line);padding:.42em .78em;border-radius:99px}

  /* search mock */
  .smock{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
    border:1px solid var(--line-2);border-radius:var(--radius);box-shadow:var(--glow);overflow:hidden}
  .sm-bar{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .sm-bar .mag{width:17px;height:17px;stroke:var(--muted);stroke-width:2;flex:none}
  .sm-chips{display:flex;gap:6px;flex-wrap:wrap}
  .sm-chips .chip{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--brand-3);background:var(--brand-soft);
    border:1px solid var(--brand-line);padding:.3em .6em;border-radius:7px;font-weight:600}
  .sm-run{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.62rem;color:#fff;background:var(--brand);
    padding:.46em .7em;border-radius:8px;font-weight:600;flex:none}
  .sm-body{padding:10px;display:flex;flex-direction:column;gap:9px}
  .sm-res{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:rgba(255,255,255,.03);
    opacity:0;transform:translateY(8px);transition:all .5s ease}
  .played .sm-res{opacity:1;transform:none}
  .played .sm-res:nth-child(2){transition-delay:.18s}
  .played .sm-res:nth-child(3){transition-delay:.36s}
  .sm-res .r1{display:flex;align-items:center;gap:8px}
  .sm-res .rsrc{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--ink);font-weight:500;display:flex;align-items:center;gap:6px}
  .sm-res .rsrc i{width:7px;height:7px;border-radius:2px;flex:none}
  .sm-res .rel{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.56rem;font-weight:600;padding:.26em .5em;border-radius:6px;
    background:var(--brand-soft);color:var(--brand-3);border:1px solid var(--brand-line)}
  .sm-res .rtxt{font-size:.8rem;color:var(--ink-2);margin-top:7px;line-height:1.5}
  .sm-res .r3{display:flex;align-items:center;gap:8px;margin-top:8px}

  /* report mock */
  .repwrap{position:relative}
  .report{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
    border:1px solid var(--line-2);border-radius:14px;box-shadow:var(--glow);overflow:hidden}
  .report .rhead{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02);position:relative}
  .report .rhead::after{content:"";position:absolute;left:0;bottom:-1px;height:2px;width:0;background:linear-gradient(90deg,var(--brand),var(--blue));transition:width 1.6s ease}
  .played .rhead::after{width:100%}
  .report .rhead .fic{width:28px;height:28px;border-radius:8px;background:var(--brand-soft);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;flex:none}
  .report .rhead .fic svg{width:15px;height:15px;stroke:var(--brand-3)}
  .report .rhead .rt{font-weight:700;font-size:.84rem;color:var(--ink);line-height:1.3}
  .report .rhead .rt span{display:block;font-family:"IBM Plex Mono",monospace;font-size:.62rem;color:var(--muted);font-weight:400;margin-top:1px}
  .report .rhead .fmt{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.6rem;color:var(--brand-3);
    border:1px solid var(--brand-line);padding:.3em .55em;border-radius:6px;font-weight:600;flex:none}
  .report .rbody{padding:14px;display:flex;flex-direction:column;gap:13px}
  .rstat{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .rstat .rs{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:10px 11px}
  .rstat .rs .v{font-weight:800;font-size:1.02rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .rstat .rs .k{font-family:"IBM Plex Mono",monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:3px}
  .rsent{display:flex;flex-direction:column;gap:7px}
  .rsent .rsrow{display:flex;align-items:center;gap:9px;font-size:.7rem;color:var(--ink-2)}
  .rsent .rsrow .rl{width:66px;flex:none}
  .rsent .rsrow .bar{flex:1;height:7px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden}
  .rsent .rsrow .bar i{display:block;height:100%;width:0;transition:width 1.4s cubic-bezier(.2,.7,.3,1)}
  .played .rsent .rsrow:nth-child(2) .bar i{transition-delay:.15s}
  .played .rsent .rsrow:nth-child(3) .bar i{transition-delay:.3s}
  .rsent .rsrow .pct{font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:var(--muted);width:34px;text-align:right;font-variant-numeric:tabular-nums}
  .rsum{background:var(--brand-tint);border:1px solid var(--brand-line);border-radius:10px;padding:11px 12px}
  .rsum .h{font-family:"IBM Plex Mono",monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;color:var(--brand-3);margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .rsum p{font-size:.76rem;color:var(--ink-2);line-height:1.55}

  /* transcript mock */
  .tmock{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.25));
    border:1px solid var(--line-2);border-radius:var(--radius);box-shadow:var(--glow);overflow:hidden;color:var(--ink-2)}
  .t-head{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--line)}
  .t-src{font-family:"IBM Plex Mono",monospace;font-size:.74rem;color:#fff;font-weight:500;display:flex;align-items:center;gap:8px}
  .t-src .tv{width:9px;height:9px;border-radius:2px;background:var(--brand-3);flex:none}
  .rec{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
    color:#FB7185;display:inline-flex;align-items:center;gap:6px;font-weight:600}
  .rec::before{content:"";width:8px;height:8px;border-radius:50%;background:#F43F5E;animation:bp2 1.6s infinite}
  @keyframes bp2{0%,100%{opacity:1}50%{opacity:.25}}
  .t-lang{font-family:"IBM Plex Mono",monospace;font-size:.58rem;color:var(--muted);border:1px solid var(--line-2);padding:.32em .55em;border-radius:6px}
  .t-body{padding:14px 15px;display:flex;flex-direction:column;gap:13px;height:264px;overflow:hidden}
  .tline{opacity:0;transform:translateY(6px)}
  .tline.show{opacity:1;transform:none;transition:all .5s ease}
  .tline .spk{font-family:"IBM Plex Mono",monospace;font-size:.62rem;font-weight:600;letter-spacing:.03em;margin-bottom:4px;
    display:inline-flex;align-items:center;gap:6px}
  .tline .spk i{width:7px;height:7px;border-radius:50%}
  .tline.s1 .spk{color:#7CC5FF}.tline.s1 .spk i{background:#7CC5FF}
  .tline.s2 .spk{color:var(--brand-3)}.tline.s2 .spk i{background:var(--brand-3)}
  .tline .txt{font-size:.82rem;line-height:1.6;color:var(--ink-2)}
  .tline .txt mark{background:rgba(139,92,246,.28);color:#E9E0FF;padding:0 4px;border-radius:4px;font-weight:600}
  .t-foot{border-top:1px solid var(--line);padding:11px 15px;display:flex;align-items:center;gap:10px}
  .t-foot .kw{font-family:"IBM Plex Mono",monospace;font-size:.62rem;color:var(--brand-3);background:var(--brand-soft);
    border:1px solid var(--brand-line);padding:.36em .62em;border-radius:8px;display:inline-flex;align-items:center;gap:6px;font-weight:600}
  .t-foot .cur{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.6rem;color:var(--muted);font-variant-numeric:tabular-nums}

  /* who */
  .uses{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
  .use{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));
    border:1px solid var(--line);border-radius:13px;padding:20px;transition:border-color .2s, transform .2s, box-shadow .2s}
  .use:hover{border-color:var(--brand-line);transform:translateY(-3px);box-shadow:var(--shadow-sm)}
  .use .uh{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .use .uh .ui{width:32px;height:32px;border-radius:9px;background:var(--brand-soft);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;flex:none}
  .use .uh .ui svg{width:17px;height:17px;stroke:var(--brand-3);stroke-width:1.7}
  .use .uh b{font-size:.92rem;color:var(--ink);font-weight:700}
  .use p{color:var(--muted);font-size:.82rem;line-height:1.6}

  /* adapt band */
  .adapt{background:linear-gradient(150deg,rgba(139,92,246,.12),rgba(255,255,255,.02));
    border:1px solid var(--line-2);border-radius:22px;padding:clamp(32px,4.5vw,52px);position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
  .adapt::before{content:"";position:absolute;right:-70px;top:-70px;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle,rgba(139,92,246,.4),transparent 70%)}
  .adapt::after{content:"";position:absolute;left:-60px;bottom:-80px;width:240px;height:240px;border-radius:50%;
    background:radial-gradient(circle,rgba(91,141,239,.22),transparent 70%)}
  .adapt-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,4vw,50px);align-items:center;position:relative}
  .adapt h2{color:#fff;margin-top:14px}
  .adapt .lead{color:var(--ink-2);opacity:.8;margin-top:14px}
  .adapt-list{display:flex;flex-direction:column;gap:14px}
  .al{display:flex;gap:13px;align-items:flex-start;background:rgba(255,255,255,.045);border:1px solid var(--line);
    border-radius:13px;padding:15px 16px;transition:border-color .2s,background .2s}
  .al:hover{border-color:var(--brand-line);background:rgba(139,92,246,.08)}
  .al .ac{width:28px;height:28px;border-radius:8px;background:var(--brand-soft);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;flex:none}
  .al .ac svg{width:15px;height:15px;stroke:var(--brand-3);stroke-width:1.9}
  .al b{color:#fff;font-weight:600;font-size:.88rem}
  .al p{color:var(--muted);font-size:.8rem;margin-top:3px;line-height:1.6}

  /* faq */
  .faq{max-width:800px;margin:0 auto}
  .faq details{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));
    border:1px solid var(--line);border-radius:13px;margin-bottom:11px;overflow:hidden;transition:border-color .2s}
  .faq details[open]{border-color:var(--brand-line);box-shadow:var(--shadow-sm)}
  .faq summary{padding:17px 22px;cursor:pointer;font-weight:700;color:var(--ink);font-size:.94rem;list-style:none;
    display:flex;align-items:center;justify-content:space-between;gap:16px;line-height:1.4}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary .pl{flex:none;width:20px;height:20px;position:relative}
  .faq summary .pl::before,.faq summary .pl::after{content:"";position:absolute;inset:0;margin:auto;background:var(--brand-3);border-radius:2px}
  .faq summary .pl::before{width:12px;height:2px}.faq summary .pl::after{width:2px;height:12px;transition:transform .25s}
  .faq details[open] summary .pl::after{transform:scaleY(0)}
  .faq .a{padding:0 22px 19px;color:var(--muted);font-size:.87rem;max-width:66ch;line-height:1.68}

  /* contact */
  .cta{padding:clamp(18px,4vw,36px) 0 clamp(58px,8vw,92px)}
  .cta-card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
    border:1px solid var(--line-2);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
  .cta-left{padding:clamp(30px,4vw,48px);background:linear-gradient(150deg,rgba(139,92,246,.16),transparent 70%);position:relative}
  .cta-left h2{font-size:clamp(1.35rem,2.5vw,1.8rem);color:#fff}
  .cta-left p{color:var(--muted);margin-top:13px;max-width:31em;font-size:.92rem;line-height:1.7}
  .cta-pts{display:flex;flex-direction:column;gap:11px;margin-top:22px}
  .cta-pts .p{display:flex;gap:10px;align-items:center;font-size:.85rem;color:var(--ink-2)}
  .cta-pts .p svg{width:17px;height:17px;stroke:var(--brand-3);flex:none}
  .cta-right{padding:clamp(30px,4vw,46px)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:6px}
  .field label .req{color:#FB7185}
  .field input,.field textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line-2);border-radius:10px;
    padding:11px 13px;color:var(--ink);font-family:inherit;font-size:.88rem;transition:border-color .18s, box-shadow .18s, background .18s}
  .field textarea{resize:vertical;min-height:78px}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted-2)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--brand);background:rgba(139,92,246,.06);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
  .field.err input{border-color:var(--neg)}
  .field .me{color:#FB7185;font-size:.72rem;margin-top:5px;display:none}
  .field.err .me{display:block}
  .cta-right .btn-primary{width:100%;margin-top:4px}
  .fnote{color:var(--muted-2);font-size:.72rem;text-align:center;margin-top:12px}
  .ferr{display:none;color:#FB7185;font-size:.8rem;text-align:center;margin-top:11px;
    background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:10px;padding:9px}
  .ferr.show{display:block}
  .csuccess{display:none;text-align:center;padding:22px 6px}
  .csuccess.show{display:block;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .csuccess .ok{width:60px;height:60px;border-radius:50%;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .csuccess .ok svg{width:28px;height:28px;stroke:#34D399}
  .csuccess h3{font-size:1.2rem;margin-bottom:7px;color:var(--ink)}.csuccess p{color:var(--muted);max-width:30em;margin:0 auto;font-size:.88rem}

  /* footer */
  footer{border-top:1px solid var(--line);padding:46px 0 32px;position:relative;z-index:1;background:rgba(255,255,255,.015)}
  .foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:28px}
  .foot-brand .logo{width:30px;height:30px;border-radius:9px;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  .foot-brand p{color:var(--muted);font-size:.84rem;margin-top:13px;max-width:32ch;line-height:1.65}
  .foot-col h4{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:12px}
  .foot-col a{display:block;color:var(--muted);font-size:.85rem;padding:4px 0;transition:color .18s}
  .foot-col a:hover{color:var(--ink)}
  .foot-bot{display:flex;justify-content:space-between;align-items:center;margin-top:38px;padding-top:20px;border-top:1px solid var(--line);
    color:var(--muted-2);font-size:.78rem;flex-wrap:wrap;gap:10px}

  .reveal{opacity:0;transform:translateY(20px);transition:opacity .7s ease, transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;transition:none}
    .feed-head .dot{animation:none}.mention{opacity:1;transform:none}.alert{opacity:1;transform:none}
    .tline{opacity:1;transform:none}.rec::before{animation:none}
    .sm-res{opacity:1;transform:none}
    .rsent .rsrow .bar i{transition:none}.report .rhead::after{transition:none}
  }

  /* keep the "who" heading on one line only where there's room */
  @media (min-width:720px){ #who .sec-head h2{white-space:nowrap} }

  @media (max-width:960px){
    .nav-links{display:none}.hamburger{display:flex}
    .hero-grid{grid-template-columns:1fr;gap:38px}.feed{max-width:540px}
    .stats .wrap{grid-template-columns:1fr 1fr;gap:24px}.stat:nth-child(2){border-right:none;padding-right:0}
    .ov{grid-template-columns:1fr}
    .fn-grid,.fn-grid.rev{grid-template-columns:1fr;gap:30px}
    .fn-grid.rev .fn-side{order:0}
    .uses{grid-template-columns:1fr 1fr}
    .adapt-grid{grid-template-columns:1fr;gap:30px}
    .cta-card{grid-template-columns:1fr}
    .foot-grid{grid-template-columns:1fr 1fr;gap:30px}
  }
  @media (max-width:600px){
    .wrap{padding:0 18px}
    .nav-cta .btn-primary{display:none}
    .brand{font-size:.92rem}
    .stats .wrap{grid-template-columns:1fr 1fr;gap:20px}
    .uses{grid-template-columns:1fr}
    .foot-grid{grid-template-columns:1fr 1fr}
  }
  @media (max-width:400px){
    .brand span{font-size:.82rem}
    .brand .logo{width:28px;height:28px}
  }
  @media (max-width:360px){
    .rstat{grid-template-columns:1fr 1fr}
  }
</style>

  document.documentElement.setAttribute('lang',lang);
  document.documentElement.setAttribute('data-lang',lang);
  document.querySelectorAll('[data-i]').forEach(function(el){
    var k=el.getAttribute('data-i'); if(d[k]!==undefined) el.innerHTML=d[k];
  });
  document.querySelectorAll('[data-ph]').forEach(function(el){
    var k=el.getAttribute('data-ph'); if(d[k]!==undefined) el.setAttribute('placeholder',d[k]);
  });
  document.getElementById('langKa').classList.toggle('on',lang==='ka');
  document.getElementById('langEn').classList.toggle('on',lang==='en');
  renderFeedStatic(); renderSearch(); renderTranscript();
}

(function(){

    var target=parseInt(el.getAttribute('data-target'),10); if(!target) return;
    if(reduce){ el.textContent=target.toLocaleString('en-US'); return; }
    var start=null, dur=1300;
    function step(ts){ if(!start)start=ts; var p=Math.min((ts-start)/dur,1); var v=Math.floor(p*target);
      el.textContent=v.toLocaleString('en-US'); if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }
  function play(){
    wrap.classList.add('played');
    wrap.querySelectorAll('.rsent .rsrow .bar i').forEach(function(i){ i.style.width=(i.getAttribute('data-w')||0)+'%'; });
    countUp(document.getElementById('rv1')); countUp(document.getElementById('rv2'));
  }
  if(reduce){ play(); return; }
  var ob=new IntersectionObserver(function(en){en.forEach(function(e){ if(e.isIntersecting){ play(); ob.disconnect(); } });},{threshold:.4});
  ob.observe(wrap);
})();

    if(item.s==='neg'){ negHour++; if(negHour>=TH && !breached) fireAlert(); }
    var cards=body.querySelectorAll('.mention');
    if(cards.length>MAX){ var last=cards[cards.length-1]; last.classList.add('out'); setTimeout(function(){ if(last.parentNode)last.parentNode.removeChild(last); },450); }
  }
  var line=document.getElementById('sparkLine'), dot=document.getElementById('sparkDot');
  var ys=[24,21,23,17,19,12,15,9,18,7,14,5,11], sc=0;
  function spark(){ ys.shift(); ys.push(4+Math.random()*22);
    var step=320/(ys.length-1), pts=ys.map(function(y,i){return (i*step).toFixed(0)+','+y.toFixed(0);}).join(' ');
    if(line){ line.style.transition='none'; line.style.strokeDasharray=''; line.style.strokeDashoffset=''; line.setAttribute('points',pts); }
    if(dot){ dot.setAttribute('cx','320'); dot.setAttribute('cy',ys[ys.length-1].toFixed(0)); } }
  if(reduce){ renderFeedStatic(); alertTxt.textContent=alertMsg(12); alertEl.classList.add('show'); return; }
  function begin(){ feedStarted=true; document.getElementById('feedBody').innerHTML=''; setBars(tot.pos,tot.neu,tot.neg);
    tick(); setTimeout(tick,650); setTimeout(tick,1300);
    setInterval(function(){ tick(); sc++; if(sc%2===0) spark(); },2200); }
  var started=false;
  var ob=new IntersectionObserver(function(en){en.forEach(function(e){ if(e.isIntersecting && !started){ started=true; begin(); } });},{threshold:.3});
  ob.observe(document.getElementById('feed'));
})();

/* ---------- transcript engine ---------- */
function renderTranscript(){
  if(tStarted) return;
  var body=document.getElementById('tBody'); if(!body) return;
  body.innerHTML='';
  for(var i=0;i<4;i++){ var el=tLine(TLINES[LANG][i]); el.classList.add('show'); body.appendChild(el); }
  var k=document.getElementById('kwCount'); if(k)k.textContent='3';
}
function tLine(item){ var el=document.createElement('div'); el.className='tline '+item.c;
  el.innerHTML='<div class="spk"><i></i>'+item.spk+'</div><div class="txt">'+item.t+'</div>'; return el; }
var tStarted=false;
(function(){
  var body=document.getElementById('tBody'); if(!body) return;
  var kwEl=document.getElementById('kwCount'), curEl=document.getElementById('tCur');
  function fmtTime(s){ var m=Math.floor(s/60), ss=s%60; return '00:'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; }
  if(reduce){ renderTranscript(); return; }
  var idx=0, kw=0, sec=252;
  function tick(){ var item=TLINES[LANG][idx%TLINES[LANG].length]; idx++;
    var el=tLine(item); body.appendChild(el); void el.offsetWidth; el.classList.add('show'); body.scrollTop=body.scrollHeight;
    kw+=item.kw; if(kwEl)kwEl.textContent=(kw%10); sec+=6+Math.floor(Math.random()*10); if(curEl)curEl.textContent=fmtTime(sec);
    var ls=body.querySelectorAll('.tline');
    if(ls.length>4){ var f=ls[0]; f.style.transition='all .4s ease'; f.style.opacity='0'; f.style.transform='translateY(-8px)';
      setTimeout(function(){ if(f.parentNode)f.parentNode.removeChild(f); },400); } }
  var started=false;
  var ob=new IntersectionObserver(function(en){en.forEach(function(e){ if(e.isIntersecting && !started){ started=true; tStarted=true; body.innerHTML='';
    tick(); setTimeout(tick,900); setInterval(tick,2600); } });},{threshold:.3});
  ob.observe(document.getElementById('tmock'));
})();

/* ---------- lead form -> Web3Forms ---------- */
var W3F_KEY = "9399b7ad-c7aa-4fa4-a634-b60fcc13d666";
var FORM_ENDPOINT = "https://api.web3forms.com/submit";
(function(){
  var form=document.getElementById('leadForm'); if(!form) return;
  var ferr=document.getElementById('ferr');
  function valid(){ var ok=true;
    form.querySelectorAll('[required]').forEach(function(input){
      var f=input.closest('.field'); var v=(input.value||'').trim(); var bad=!v;
      if(input.type==='email'&&v){ bad=!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
      f.classList.toggle('err',bad); if(bad) ok=false; });
    return ok; }
  form.querySelectorAll('[required]').forEach(function(input){
    input.addEventListener('input',function(){ if(input.closest('.field').classList.contains('err')) valid(); }); });
  function success(){ form.style.display='none'; document.getElementById('csuccess').classList.add('show'); }
  form.addEventListener('submit',function(e){
    e.preventDefault(); ferr.classList.remove('show');
    if(!valid()){ var fe=form.querySelector('.field.err'); if(fe) fe.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    var btn=form.querySelector('button[type=submit]'); btn.disabled=true;
    var data=new FormData(form); data.append('access_key', W3F_KEY);
    fetch(FORM_ENDPOINT,{method:'POST',body:data,headers:{'Accept':'application/json'}})
      .then(function(r){ if(r.ok){success();} else {ferr.classList.add('show');btn.disabled=false;} })
      .catch(function(){ ferr.classList.add('show');btn.disabled=false; }); });
})();

/* init */
applyLang('ka');
</script>
